openapi: 3.1.0
info:
  title: Benjrm's Rest API
  description: This is the REST API for Benjrm - a quiz platform for interactive learning and live competition
  contact:
    name: Benjrm
    url: 'https://benjrm.de'
    email: 'info@benjrm.de'
  version: 1.0.0
externalDocs:
  description: https://github.com/Benjrm/Benjrm
  url: https://github.com/Benjrm/Benjrm
servers:
  - url: 'http://localhost:8080'
  - url: 'http://localhost:80'

tags:
  - name: Quizzes
    description: Operations related to quizzes.
  - name: Questions
    description: Operations related to questions. Questions belong to quizzes.
  - name: Health
    description: Server health related checks

paths:
  /api/health:
    get:
      description: Backend healthcheck (alias of `/api/v1/health`)
      operationId: health
      tags:
        - Health
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                const: "OK"

  /api/v1/quizzes:
    post:
      description: Create a new quiz.
      operationId: createQuiz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewQuiz'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quiz'
          links:
            CreateQuestion:
              operationId: createQuestion
              parameters:
                quizId: '$response.body#/id'
            GetQuestions:
              operationId: getQuestions
              parameters:
                quizId: '$response.body#/id'
            GetQuizById:
              operationId: getQuizById
              parameters:
                quizId: '$response.body#/id'
            UpdateQuizPartiallyById:
              operationId: updateQuizPartiallyById
              parameters:
                quizId: '$response.body#/id'
            UpdateQuizFullyById:
              operationId: updateQuizFullyById
              parameters:
                quizId: '$response.body#/id'
            DeleteQuizById:
              operationId: deleteQuizById
              parameters:
                quizId: '$response.body#/id'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Quizzes

    get:
      description: Retrieve a list of quizzes, optionally filtered by hidden status.
      operationId: listQuizzes
      parameters:
        - name: hidden
          in: query
          schema:
            type: boolean
          description: Filter quizzes by hidden status
          required: false

      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Quiz'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Quizzes

  /api/v1/quizzes/{quizId}:
    get:
      description: Retrieve a quiz by its unique identifier.
      operationId: getQuizById
      parameters:
        - name: quizId
          in: path
          required: true
          description: The unique identifier of the quiz
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quiz'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Quizzes

    patch:
      description: Partially update a quiz by its unique identifier. Only the provided fields will be updated.
      operationId: updateQuizPartiallyById
      parameters:
        - name: quizId
          in: path
          required: true
          description: The unique identifier of the quiz
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateQuiz'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quiz'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Quizzes

    put:
      description: Fully update a quiz by its unique identifier. All fields must be provided.
      operationId: updateQuizFullyById
      parameters:
        - name: quizId
          in: path
          required: true
          description: The unique identifier of the quiz
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewQuiz'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quiz'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Quizzes

    delete:
      description: Delete a quiz by its unique identifier.
      operationId: deleteQuizById
      parameters:
        - name: quizId
          in: path
          required: true
          description: The unique identifier of the quiz
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Quizzes

  /api/v1/quizzes/{quizId}/questions:
    post:
      summary: Create a question
      operationId: createQuestion
      description: 'Create a new question'
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewQuestion'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
          links:
            GetQuestion:
              operationId: getQuestion
              parameters:
                quizId: '$request.path.quizId'
                questionId: '$response.body#/id'
            UpdateQuestion:
              operationId: updateQuestion
              parameters:
                quizId: '$request.path.quizId'
                questionId: '$response.body#/id'
            ReplaceQuestion:
              operationId: replaceQuestion
              parameters:
                quizId: '$request.path.quizId'
                questionId: '$response.body#/id'
            DeleteQuestion:
              operationId: deleteQuestion
              parameters:
                quizId: '$request.path.quizId'
                questionId: '$response.body#/id'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Questions

    get:
      summary: Get all questions
      operationId: getQuestions
      description: 'Get all questions belonging to a quiz'
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: hidden
          in: query
          schema:
            type: boolean
          description: Filter questions by hidden status
          required: false
      responses:
        '200':
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BaseQuestion'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Questions

  /api/v1/quizzes/{quizId}/questions/{questionId}:
    get:
      summary: Get a single question
      operationId: getQuestion
      description: 'Get a single question belonging to a quiz'
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: questionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Question with answers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Questions
    patch:
      summary: Partially update a question
      operationId: updateQuestion
      description: 'Partially update a question'
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: questionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateQuestion'
      responses:
        '200':
          description: Updated question
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Questions

    put:
      summary: Replace a question
      operationId: replaceQuestion
      description: 'Replace a question'
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: questionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewQuestion'
      responses:
        '200':
          description: Updated question
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Questions

    delete:
      summary: Delete a question
      operationId: deleteQuestion
      description: Delete a question
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: questionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Questions

components:
  schemas:
    Error:
      type: object
      required:
        - category
        - error
        - message
      properties:
        category:
          type: string
          example: 'Quiz'
        error:
          type: string
          example: 'not_found'
        message:
          type: string
          example: 'Quiz not found'

    NewQuiz:
      type: object
      additionalProperties: false
      required:
        - title
      properties:
        title:
          type: string
          example: 'Questions about the fox'
        description:
          type: string
          nullable: true
          example: 'Learn why the fox is important in operating systems and fonts'
        hidden:
          type: boolean
          default: false
          example: false

    UpdateQuiz:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          example: 'Questions about the fox'
        description:
          type: string
          nullable: true
          example: 'Learn why the fox is important in operating systems and fonts'
        hidden:
          type: boolean
          example: false

    Quiz:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: 'Questions about the fox'
        description:
          type: string
          nullable: true
          example: 'Learn why the fox is important in operating systems and fonts'
        hidden:
          type: boolean
          example: false
        created:
          type: string
          format: 'date-time'
          example: '2024-01-01T12:00:00.000000Z'
        modified:
          type: string
          format: 'date-time'
          example: '2024-01-01T12:00:00.000000Z'

    Position:
      oneOf:
        - type: object
        - type: object
          additionalProperties: false
          required:
            - prev
          properties:
            prev:
              type: string
              format: uuid
        - type: object
          additionalProperties: false
          required:
            - next
          properties:
            next:
              type: string
              format: uuid
    
    BaseQuestion:
      type: object
      required:
        - id
        - question
        - hidden
      properties:
        id:
          type: string
          format: uuid
        question:
          type: string
          example: 'Why did the quick brown fox jump over the lazy dog?'
        hidden:
          type: boolean
          example: false
        created:
          type: string
          format: 'date-time'
          example: '2024-01-01T12:00:00.000000Z'
        modified:
          type: string
          format: 'date-time'
          example: '2024-01-01T12:00:00.000000Z'
    
    Question:
      allOf:
        - $ref: '#/components/schemas/BaseQuestion'
        - $ref: '#/components/schemas/QuestionOptions'
    
    QuestionOptions:
      oneOf:
        - $ref: '#/components/schemas/SlideOptions'
        - $ref: '#/components/schemas/SingleChoiceOptions'
        - $ref: '#/components/schemas/MultipleChoiceOptions'
        - $ref: '#/components/schemas/OrderOptions'
      discriminator:
        propertyName: type
        mapping:
          SLIDE: '#/components/schemas/SlideOptions'
          SINGLE_CHOICE: '#/components/schemas/SingleChoiceOptions'
          MULTIPLE_CHOICE: '#/components/schemas/MultipleChoiceOptions'
          ORDER: '#/components/schemas/OrderOptions'
    
    SlideOptions:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [SLIDE]
    
    SingleChoiceOptions:
      type: object
      required:
        - type
        - options
      properties:
        type:
          type: string
          enum: [SINGLE_CHOICE]
        options:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/AnswerChoice'
    
    MultipleChoiceOptions:
      type: object
      required:
        - type
        - options
      properties:
        type:
          type: string
          enum: [MULTIPLE_CHOICE]
        options:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/AnswerChoice'
    
    OrderOptions:
      type: object
      required:
        - type
        - options
      properties:
        type:
          type: string
          enum: [ORDER]
        options:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/AnswerOrder'
    
    AnswerChoice:
      type: object
      additionalProperties: false
      required: 
        - id
        - correct
        - answer
      properties:
        id:
          type: string
          format: uuid
        correct:
          type: boolean
          example: true
        answer:
          type: string
          example: 'Testing fonts'

    AnswerOrder:
      type: object
      additionalProperties: false
      required: 
        - id
        - answer
      properties:
        id:
          type: string
          format: uuid
        answer:
          type: string
          example: 'Testing fonts'

    NewQuestion:
      allOf:
        - type: object
          required:
            - question
          properties:
            question:
              type: string
              example: 'Why did the quick brown fox jump over the lazy dog?'
            hidden:
              type: boolean
              default: false
        - $ref: '#/components/schemas/NewQuestionOptions'
        - $ref: '#/components/schemas/Position'
          nullable: true
    
    NewQuestionOptions:
      oneOf:
        - $ref: '#/components/schemas/NewSlideOptions'
        - $ref: '#/components/schemas/NewSingleChoiceOptions'
        - $ref: '#/components/schemas/NewMultipleChoiceOptions'
        - $ref: '#/components/schemas/NewOrderOptions'
      discriminator:
        propertyName: type
        mapping:
          SLIDE: '#/components/schemas/NewSlideOptions'
          SINGLE_CHOICE: '#/components/schemas/NewSingleChoiceOptions'
          MULTIPLE_CHOICE: '#/components/schemas/NewMultipleChoiceOptions'
          ORDER: '#/components/schemas/NewOrderOptions'
    
    NewSlideOptions:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [SLIDE]
    
    NewSingleChoiceOptions:
      type: object
      required:
        - type
        - options
      properties:
        type:
          type: string
          enum: [SINGLE_CHOICE]
        options:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/NewAnswerChoice'
          contains:
            $ref: '#/components/schemas/NewCorrectAnswerChoice'
    
    NewMultipleChoiceOptions:
      type: object
      required:
        - type
        - options
      properties:
        type:
          type: string
          enum: [MULTIPLE_CHOICE]
        options:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/NewAnswerChoice'
          contains:
            $ref: '#/components/schemas/NewCorrectAnswerChoice'
    
    NewOrderOptions:
      type: object
      required:
        - type
        - options
      properties:
        type:
          type: string
          enum: [ORDER]
        options:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/NewAnswerOrder'

    NewAnswerChoice:
      type: object
      additionalProperties: false
      required:
        - answer
      properties:
        answer:
          type: string
          example: 'Testing fonts'
        correct:
          type: boolean
          default: false

    NewCorrectAnswerChoice:
      type: object
      properties:
        correct:
          const: true
      required:
        - correct

    NewAnswerOrder:
      type: object
      additionalProperties: false
      required:
        - answer
      properties:
        answer:
          type: string
          example: 'Testing fonts'

    UpdateQuestion:
      type: object
      additionalProperties: false
      allOf:
        - type: object
          properties:
            question:
              type: string
              example: 'Why did the quick brown fox jump over the lazy dog?'
              nullable: true
            hidden:
              type: boolean
        - $ref: '#/components/schemas/UpdateQuestionOptions'
          nullable: true
        - $ref: '#/components/schemas/Position'
          nullable: true

    UpdateQuestionOptions:
      oneOf:
        - type: object
          properties:
            type:
              type: object
              nullable: true
        - $ref: '#/components/schemas/UpdateSlideOptions'
        - $ref: '#/components/schemas/UpdateSingleChoiceOptions'
        - $ref: '#/components/schemas/UpdateMultipleChoiceOptions'
        - $ref: '#/components/schemas/UpdateOrderOptions'
      discriminator:
        propertyName: type
        mapping:
          SLIDE: '#/components/schemas/UpdateSlideOptions'
          SINGLE_CHOICE: '#/components/schemas/UpdateSingleChoiceOptions'
          MULTIPLE_CHOICE: '#/components/schemas/UpdateMultipleChoiceOptions'
          ORDER: '#/components/schemas/UpdateOrderOptions'
    
    UpdateSlideOptions:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [SLIDE]
    
    UpdateSingleChoiceOptions:
      type: object
      required:
        - type
        - options
      properties:
        type:
          type: string
          enum: [SINGLE_CHOICE]
        options:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/UpdateAnswerChoice'
    
    UpdateMultipleChoiceOptions:
      type: object
      required:
        - type
        - options
      properties:
        type:
          type: string
          enum: [MULTIPLE_CHOICE]
        options:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/UpdateAnswerChoice'
    
    UpdateOrderOptions:
      type: object
      required:
        - type
        - options
      properties:
        type:
          type: string
          enum: [ORDER]
        options:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/UpdateAnswerOrder'

    UpdateAnswerChoice:
      type: object
      additionalProperties: false
      anyOf:
        - required: [id]
        - required: [answer]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        answer:
          type: string
          example: 'Testing fonts'
        correct:
          type: boolean
          nullable: true

    UpdateAnswerOrder:
      type: object
      additionalProperties: false
      anyOf:
        - required: [id]
        - required: [answer]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        answer:
          type: string
          example: 'Testing fonts'
