opencollection: 1.0.0
info:
  name: Keycloak
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
  environments:
    - name: Local
      variables:
        - name: BASE_URL
          value: http://127.0.0.1:8088
        - name: BASE_URL_MANAGEMENT_INTERFACE
          value: http://127.0.0.1:9000
        - name: REALM_NAME
          value: benjrm
        - name: CLIENT_NAME
          value: api
        - name: CLIENT_SECRET
          secret: true
items:
  - info:
      name: Health
      type: folder
      seq: 1
    request:
      auth: inherit
    items:
      - info:
          name: Accumulate
          type: http
          seq: 4
        http:
          method: GET
          url: '{{BASE_URL_MANAGEMENT_INTERFACE}}/health'
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Liveness Check
          type: http
          seq: 2
        http:
          method: GET
          url: '{{BASE_URL_MANAGEMENT_INTERFACE}}/health/live'
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Readyness
          type: http
          seq: 3
        http:
          method: GET
          url: '{{BASE_URL_MANAGEMENT_INTERFACE}}/health/ready'
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Startup probe
          type: http
          seq: 1
        http:
          method: GET
          url: '{{BASE_URL_MANAGEMENT_INTERFACE}}/health/started'
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
  - info:
      name: OpenID Connect
      type: http
      seq: 2
    http:
      method: POST
      url: '{{BASE_URL}}/realms/{{REALM_NAME}}/protocol/openid-connect/token'
      body:
        type: form-urlencoded
        data:
          - name: client_id
            value: '{{CLIENT_NAME}}'
          - name: grant_type
            value: client_credentials
          - name: client_secret
            value: '{{CLIENT_SECRET}}'
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
request:
  auth:
    type: oauth2
    flow: client_credentials
    accessTokenUrl: '{{BASE_URL}}/realms/{{REALM_NAME}}/protocol/openid-connect/token'
    refreshTokenUrl: ''
    credentials:
      clientId: '{{CLIENT_NAME}}'
      clientSecret: '{{CLIENT_SECRET}}'
      placement: body
    scope: ''
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
    settings:
      autoFetchToken: true
      autoRefreshToken: false
bundled: true
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    exportedAt: '2026-05-09T14:44:41.740Z'
    exportedUsing: Bruno
