name: Build and push Docker Container to GHCR
run-name: Build and push Docker Container for ${{ github.event_name }} by @${{ github.actor }}

on:
  workflow_call:
  workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: benjrm/benjrm

jobs:
  # build and push the docker image for each platform
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/386
            rust_target: i686-unknown-linux-musl
            platform_pair: linux-386
          - platform: linux/amd64
            rust_target: x86_64-unknown-linux-musl
            platform_pair: linux-amd64
          - platform: linux/arm/v6
            rust_target: arm-unknown-linux-musleabihf
            platform_pair: linux-arm-v6
          - platform: linux/arm/v7
            rust_target: armv7-unknown-linux-musleabihf
            platform_pair: linux-arm-v7
          - platform: linux/arm64
            rust_target: aarch64-unknown-linux-musl
            platform_pair: linux-arm64
          - platform: linux/ppc64le
            rust_target: powerpc64le-unknown-linux-musl
            platform_pair: linux-ppc64le
          - platform: linux/riscv64
            rust_target: riscv64gc-unknown-linux-musl
            platform_pair: linux-riscv64
          - platform: linux/s390x
            rust_target: s390x-unknown-linux-gnu
            platform_pair: linux-s390x
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine base image
        id: base
        run: |
          if echo "${{ matrix.rust_target }}" | grep -q musl; then
            echo "image=alpine:3.24" >> "$GITHUB_OUTPUT"
          else
            echo "image=debian:12.13-slim" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image with digest
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            RUST_TARGET=${{ matrix.rust_target }}
            BASE_IMAGE=${{ steps.base.outputs.image }}
          provenance: false
          outputs: type=image,"name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform_pair }}

      - name: Export image digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build-and-push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image as artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # This job merges all platform images into one multi-arch image and assigns the tags.
  merge-images:
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata and create tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Disable latest tag on main branch. We only want to tag with latest on tag creation when we create a new release.
          flavor: |
            latest=false
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=long

      - name: Create manifest list and push multi-arch image
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.source=https://github.com/Benjrm/Benjrm" \
            --annotation "index:org.opencontainers.image.description=Benjrm - a quiz platform for interactive learning and live competition" \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
