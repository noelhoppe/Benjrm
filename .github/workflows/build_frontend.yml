name: Build Pipeline

on:
  workflow_call:
    outputs:
      artifact-name:
        description: Name of the uploaded artifact
        value: ${{ jobs.build_frontend.outputs.artifact-name }}

jobs:
  build_frontend:
    name: Build Frontend
    runs-on: 'ubuntu-24.04'
    outputs:
      artifact-name: ${{ steps.set-output.outputs.artifact-name }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache frontend build
        id: cache-frontend
        uses: actions/cache@v4
        with:
          path: 'frontend/dist'
          key: ${{ runner.os }}-frontend-build-${{ hashFiles('frontend/src/**', 'frontend/package-lock.json', 'frontend/vite.config.ts', 'frontend/tsconfig.json') }}

      - name: Setup Node.js
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: cd 'frontend' && npm ci --prefer-offline

      - name: Build frontend
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: cd 'frontend' && npm run build

      - name: Upload frontend build as artifact
        id: set-output
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: 'frontend/dist'
          retention-days: 1
