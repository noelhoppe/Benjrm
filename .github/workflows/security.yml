name: Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      security: ${{ steps.filter.outputs.security }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
            filters: |
                security:
                - "frontend/package*.json"
                - '**/Dockerfile*'
                - 'docker-compose*.yml'
                - "services/**"

  # SonarQube for SAST
  sonarqube:
    name: "SonarQube SAST Scan"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=.
            -Dsonar.qualitygate.wait=true

  # Trivy File System Scan
  # Information and Documentation:
  # https://github.com/marketplace/actions/aqua-security-trivy?version=v0.36.0
  #
  trivy:
    name: "Trivy Filesystem Scan"
    needs: detect-changes
    runs-on: ubuntu-24.04
    if: needs.detect-changes.outputs.security == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          trivy-config: 'trivy.yaml'