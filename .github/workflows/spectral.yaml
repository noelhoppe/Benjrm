name: Run Spectral on Pull Requests
on:
  pull_request:
    paths:
      - 'docs/openapispec/RestInterface.yaml'
      - '.github/workflows/spectral.yaml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Run Spectral
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: stoplightio/spectral-action@v0.8.13
        with:
          file_glob: 'docs/openapispec/RestInterface.yaml'
